name: Import Code from ZIP

on:
  workflow_dispatch:  # 需要手动点击运行

jobs:
  import-code:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 克隆当前仓库
      - name: Checkout repository
        uses: actions/checkout@v3
      
      # 2. 下载你的 ZIP 压缩包
      - name: Download ZIP file
        run: |
          curl -L "https://oss-cn-foshan.midea.com/hubble-user-file/static.zip?AWSAccessKeyId=jnlujubta9kgq65nnvavwkvp&Expires=1782272801&Signature=hi6sHIvT6tFLgFmSPCG9JJUBeAA%3D" -o code.zip
          echo "下载完成，文件大小："
          ls -lh code.zip
      
      # 3. 解压 ZIP 文件（覆盖 README.md）
      - name: Extract ZIP
        run: |
          unzip -o code.zip -d ./
          rm code.zip
          echo "解压完成，当前目录文件："
          ls -la
      
      # 4. 提交并推送到仓库
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "从 ZIP 导入代码 [$(date +'%Y-%m-%d %H:%M:%S')]" || echo "没有新文件需要提交"
          git push
